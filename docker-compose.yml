version: '3.8'

services:

  postgres:
    image: postgres:16
    container_name: slotify-postgres
    environment:
      POSTGRES_DB: slotifydb
      POSTGRES_USER: slotify
      POSTGRES_PASSWORD: slotify123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7.2
    container_name: slotify-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: slotify-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: slotify-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: slotify-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:10.4.0
    container_name: slotify-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: slotify123
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  anthropic:
    api:
      key: REMOVEDant-api03-pLVDS5ZffpMx1dnUg7vjFuourtJUvUvcujDMCIj9J4haXgexiG-Q7DNe9n1DfaZuFaU-uu5kA1EgZ0Z3bgqxCw-72iy0gAA
      model: claude-opus-4-20250514
      max-tokens: 1024

volumes:
  postgres_data:
  redis_data:
  grafana_data: