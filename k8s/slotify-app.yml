apiVersion: apps/v1
kind: Deployment
metadata:
  name: slotify
  namespace: slotify
spec:
  replicas: 2
  selector:
    matchLabels:
      app: slotify
  template:
    metadata:
      labels:
        app: slotify
    spec:
      containers:
        - name: slotify
          image: slotify:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: slotify-config
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: slotify-secrets
                  key: ANTHROPIC_API_KEY
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 15
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 20
            failureThreshold: 5
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: slotify
  namespace: slotify
spec:
  selector:
    app: slotify
  type: NodePort
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080